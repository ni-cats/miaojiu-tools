    - provider: "hunyuan"
      secretId: "AKIDseCWaPzJPGsFNMHRM6bhaEeqmTv98sOg"
      secretKey: "SvCxVqxpTs1vaQ1NVO2SeoqgNrY2HI4b"
      model: "hunyuan-lite"
      enabled: true